services:

  postgres:
    image: postgres:17
    container_name: procurement-db
    restart: always

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:
    build:
      context: ./procurement-api

    container_name: procurement-backend

    restart: always

    ports:
      - "3000:3000"

    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      PORT: ${PORT}

    depends_on:
      - postgres

    volumes:
      - ./procurement-api:/app
      - /app/node_modules


  frontend:
    build:
      context: ./procurement-fe

    container_name: procurement-frontend

    restart: always

    ports:
      - "3001:3000"

    depends_on:
      - backend

    volumes:
      - ./procurement-fe:/app
      - /app/node_modules


volumes:
  postgres_data: